<title>Trilha Northel · Gestão & Governança</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1E3F; --navy-2:#0f2649; --navy-3:#16325e;
  --cyan:#00BFD8; --cyan-dim:#0a94a8; --gold:#D3A94F;
  --paper:#F4F7FB; --card:#ffffff; --ink:#0B1E3F; --ink-2:#3a4a63;
  --muted:#6a7890; --line:#e2e8f2; --line-2:#d3dcea;
  --ok:#1f9d6b; --warn:#c98a1f; --bad:#c0433f;
  --rail:300px;
  --shadow:0 1px 2px rgba(11,30,63,.06),0 8px 24px rgba(11,30,63,.06);
  --shadow-lg:0 12px 40px rgba(11,30,63,.16);
  --serif:"Fraunces",Georgia,serif; --sans:"Manrope",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.6}
button,.btn,.opt,input[type=checkbox],.kcard{touch-action:manipulation}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--cyan);color:var(--navy)}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:var(--rail) 1fr;min-height:100vh}

/* ---------- Rail / trilha ---------- */
.rail{background:var(--navy);color:#dfe8f5;position:sticky;top:0;height:100vh;overflow-y:auto;
  border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column}
.rail::-webkit-scrollbar{width:8px}
.rail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}
.brand{padding:22px 22px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.07)}
.mark{width:34px;height:34px;flex:0 0 auto}
.brand-txt strong{font-family:var(--serif);font-weight:600;font-size:17px;color:#fff;letter-spacing:.2px;display:block;line-height:1.1}
.brand-txt span{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan)}

.progwrap{padding:16px 22px 6px}
.progline{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:#9fb2ce;margin-bottom:7px}
.progline b{font-family:var(--serif);font-size:15px;color:#fff;letter-spacing:0}
.progbar{height:5px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.progbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),#6fe4f2);border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}

.trail{padding:12px 14px 26px;flex:1}
.phase{margin-top:14px}
.phase-h{display:flex;align-items:center;gap:9px;padding:8px 10px 6px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8ea3c4}
.phase-h .pn{font-family:var(--serif);font-size:13px;color:var(--cyan);letter-spacing:.04em}
.phase.done .phase-h .seal{margin-left:auto;color:var(--gold);font-size:13px;display:inline-flex;align-items:center;gap:4px;letter-spacing:.02em}
.seal{display:none}
.phase.done .seal{display:inline-flex}

.mods{list-style:none;margin:2px 0 0;padding:0;position:relative}
.mods::before{content:"";position:absolute;left:20px;top:6px;bottom:14px;width:2px;background:rgba(255,255,255,.09)}
.mod{position:relative;display:flex;gap:12px;align-items:flex-start;padding:8px 10px 8px 10px;border-radius:9px;color:#c7d4e8;font-size:13.5px;transition:background .15s,color .15s;border:1px solid transparent}
.mod:hover{background:rgba(255,255,255,.05);color:#fff}
.mod.active{background:rgba(0,191,216,.13);border-color:rgba(0,191,216,.35);color:#fff}
.dot{position:relative;z-index:1;flex:0 0 auto;width:18px;height:18px;margin-top:2px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:var(--navy);display:grid;place-items:center;font-size:10px;transition:.15s}
.mod.active .dot{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(0,191,216,.15)}
.mod.done .dot{background:var(--cyan);border-color:var(--cyan);color:var(--navy)}
.mod .mtitle{line-height:1.3}
.mod .mnum{font-size:10.5px;color:#7f93b4;letter-spacing:.08em;text-transform:uppercase;display:block}
.mod.active .mnum{color:var(--cyan)}
.rail-foot{padding:14px 22px 22px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:#7688a5;line-height:1.5}
.rail-foot button{background:none;border:1px solid rgba(255,255,255,.14);color:#9fb2ce;font-size:11px;padding:6px 10px;border-radius:7px;letter-spacing:.03em}
.rail-foot button:hover{border-color:var(--cyan);color:#fff}

/* ---------- Main ---------- */
.main{min-width:0;padding:0 0 90px}
.topbar{position:sticky;top:0;z-index:20;background:rgba(244,247,251,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  display:none;align-items:center;gap:12px;padding:12px 18px}
.hamb{width:40px;height:40px;border-radius:9px;border:1px solid var(--line-2);background:#fff;display:grid;place-items:center}
.hamb svg{width:20px;height:20px}
.topbar .tb-title{font-family:var(--serif);font-weight:600}

.wrap{max-width:820px;margin:0 auto;padding:44px 40px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan-dim);font-weight:700;margin-bottom:14px}
.eyebrow .bar{width:26px;height:2px;background:var(--cyan)}
h1.mod-title{font-family:var(--serif);font-weight:600;font-size:clamp(30px,4.4vw,46px);line-height:1.05;letter-spacing:-.01em;margin:0 0 10px}
.lede{font-size:18px;color:var(--ink-2);max-width:62ch;margin:0 0 6px}

/* prose */
.prose h2{font-family:var(--serif);font-weight:600;font-size:24px;letter-spacing:-.01em;margin:38px 0 4px;padding-top:20px;border-top:1px solid var(--line)}
.prose h3{font-size:16px;font-weight:800;letter-spacing:.01em;margin:24px 0 6px;color:var(--navy)}
.prose p{margin:10px 0;color:var(--ink-2)}
.prose strong{color:var(--navy);font-weight:700}
.prose ul{margin:10px 0;padding-left:22px;color:var(--ink-2)}
.prose li{margin:5px 0}
.prose li::marker{color:var(--cyan-dim)}
.quote{border-left:3px solid var(--gold);background:#fbf6ec;padding:12px 16px;border-radius:0 10px 10px 0;margin:16px 0;
  font-family:var(--serif);font-size:16px;color:var(--navy);font-style:italic}
.quote .who{display:block;font-family:var(--sans);font-style:normal;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:6px}

.callout{background:#eef8fb;border:1px solid #cceef5;border-radius:12px;padding:14px 16px;margin:16px 0;font-size:14.5px}
.callout .tag{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;color:var(--cyan-dim);display:block;margin-bottom:3px}
.money{background:#f1f7f2;border:1px solid #cfe7d6}
.money .tag{color:var(--ok)}

/* concept cards */
.concepts{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin:16px 0 4px}
.ccard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;box-shadow:var(--shadow)}
.ccard b{display:block;font-size:14px;color:var(--navy);margin-bottom:3px}
.ccard span{font-size:13px;color:var(--muted);line-height:1.5}

/* PDCA wheel steps */
.pdca{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
.pdca .st{border-radius:12px;padding:13px;color:#fff;position:relative;overflow:hidden}
.pdca .st b{font-family:var(--serif);font-size:20px;display:block}
.pdca .st span{font-size:12px;opacity:.9}

label.fld{display:block;margin:12px 0 4px;font-size:12.5px;font-weight:700;color:var(--navy);letter-spacing:.02em}

  border:1px solid var(--line-2);border-radius:9px;padding:10px 12px;transition:border .15s,box-shadow .15s}

<script>
/* ==========================================================================

   App de estudo interativo. Vanilla JS, sem dependências.

/* ---------- Storage robusto (window.storage → localStorage → memória) ------ */
const Store = {
  mem:{},
  async get(k){
    try{ if(window.storage){ const r=await window.storage.get(k); return r? JSON.parse(r.value):null; } }catch(e){}
    try{ const v=localStorage.getItem(k); return v? JSON.parse(v):null; }catch(e){}
    return (k in this.mem)? this.mem[k] : null;
  },
  async set(k,v){
    this.mem[k]=v;
    try{ if(window.storage){ await window.storage.set(k,JSON.stringify(v)); return; } }catch(e){}
    try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){}
  },
  async del(k){
    delete this.mem[k];
    try{ if(window.storage){ await window.storage.delete(k); } }catch(e){}
    try{ localStorage.removeItem(k); }catch(e){}
  }
};
const KEY='northel_trilha_v1';
let state={ done:{}, checks:{}, notes:{}, current:'welcome' };

/* small helpers */
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const brl=n=>n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function ico(name){
  const p={check:'<path d="M20 6 9 17l-5-5"/>',arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>'};
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${p[name]}</svg>`;
}

/* ==========================================================================
   CONTEÚDO — Fases e módulos
   Cada módulo: {id,title,sub,body(fn->html), mount(fn), concepts[], checklist[]}
   ========================================================================== */
const PHASES=[
 {n:'FASE 1',label:'Estudo e domínio conceitual',modules:['m1','m2','m3','m4','m5','m6']},
 {n:'FASE 2',label:'Arquitetura do serviço',modules:['f2m1','f2m2','f2m3','f2m4','f2m5']},
 {n:'FASE 3',label:'Execução com cliente real',modules:['f3m1','f3m2','f3m3','f3m4']}
];

const M={};

/* ---- util blocks ---- */
const quote=(t,who)=>`<div class="quote">"${t}"<span class="who">${who}</span></div>`;
const call=(tag,html)=>`<div class="callout"><span class="tag">${tag}</span>${html}</div>`;
const money=(html)=>`<div class="callout money"><span class="tag">Tradução em R$</span>${html}</div>`;
function conceptGrid(arr){return `<div class="concepts">${arr.map(c=>`<div class="ccard"><b>${c.t}</b><span>${c.d}</span></div>`).join('')}</div>`;}

/* ======================= FASE 1 · MÓDULO 1 ============================== */
M.m1={
 title:'PDCA Falconi — Fundamentos',
 sub:'A espinha dorsal de todo o serviço de gestão. Antes de aplicar, é preciso dominar a lógica: fato e dado, problema, causa, lacuna, meta e medida.',
 concepts:[
   {t:'Fato / Dado',d:'A base de tudo. Nunca decidir por feeling — sempre a partir de fatos e dados.'},
   {t:'Problema',d:'Um resultado indesejado. "Nos resultados só existem problemas."'},
   {t:'Causa',d:'Está sempre no processo. "Nos processos só existem causas."'},
   {t:'Lacuna (gap)',d:'A distância entre o valor atual e o valor ideal/benchmark. Dá a direção do gerenciamento.'},
   {t:'Meta',d:'Objetivo + valor + prazo. Estabelecida dentro da lacuna (regra: ~50% dela ao ano).'},
   {t:'Medida',d:'O meio para atingir a meta. Prioritárias e suficientes — nem mais, nem menos.'},
 ],
 checklist:[
   'Sei explicar, em uma frase, o que é gerenciar pela qualidade total (TQM).',
   'Diferencio problema (resultado) de causa (processo) sem confundir os dois.',
   'Sei definir lacuna e explicar por que ela "dá a direção do gerenciamento".',
   'Consigo montar uma análise de Pareto por R$ e ler onde estão os poucos vitais.',
   'Aplico a regra Falconi da meta anual ≈ 50% da lacuna sem calculadora.',
 ],
 body:()=>`
  <div class="prose">
   <p>O PDCA é o sistema operacional da gestão Northel. Falando com o dono: <strong>gerenciar é resolver problemas</strong>, e resolver problema é fechar a distância entre onde o negócio está e onde ele deveria estar. Essa distância tem nome: <strong>lacuna</strong>.</p>

   <h2>Gerenciar pela qualidade total (TQM)</h2>
   <p>TQM é toda a empresa — não só o dono — resolvendo problemas com método, baseando decisão em <strong>fato e dado</strong>, não em achismo. O PDCA é o ciclo que dá esse método: Planejar, Executar (Do), Verificar (Check), Agir (Act), girando de novo, sempre.</p>
   <div class="pdca">
     <div class="st p"><b>P</b><span>Planejar — achar o problema, a causa e definir meta + medidas</span></div>
     <div class="st d"><b>D</b><span>Executar — rodar o plano com prazo e responsável</span></div>
     <div class="st c"><b>C</b><span>Verificar — comparar resultado × meta todo mês</span></div>
     <div class="st a"><b>A</b><span>Agir — contramedida no desvio e padronizar o que deu certo</span></div>
   </div>

   <h3>PDCA original × PDCA Falconi</h3>
   <p>O ciclo original (Shewhart/Deming) é a moldura. A escola <strong>Falconi</strong> turbina o <em>P</em> com o MASP — o Método de Análise e Solução de Problemas: antes de agir, você <strong>analisa os fatos até chegar na causa fundamental</strong>. É o que separa consultoria séria de "palpite bonito".</p>

   <h2>Os conceitos que sustentam tudo</h2>
   ${quote('Nos processos só existem causas; nos resultados só existem problemas.','Vicente Falconi')}
   <p>Traduzindo para o dono: se a <strong>margem caiu</strong> (resultado), isso é um problema. O <em>porquê</em> — compra mal negociada, perda de estoque, desconto sem controle — está sempre dentro de um <strong>processo</strong>. Você não conserta o resultado; você conserta a causa no processo.</p>
   ${quote('A lacuna dá a direção do gerenciamento. A meta é estabelecida dentro da lacuna.','Vicente Falconi')}

   <h2>Pareto — onde atacar primeiro</h2>
   <p>O empresário PME tem tempo e dinheiro curtos. Pareto (regra 80/20) diz onde concentrar: <strong>poucos itens vitais respondem pela maior parte do problema</strong>. Como fazer:</p>
   <ul>
     <li>Liste os itens (contas, processos, produtos) e o valor de cada um <strong>em R$</strong>.</li>
     <li>Ordene do maior para o menor.</li>
     <li>Acumule o percentual. Onde o acumulado chega perto de 80%, ali estão os <strong>poucos vitais</strong>.</li>
   </ul>
   ${call('Armadilhas comuns','Fazer Pareto por <b>quantidade</b> quando o que importa é <b>R$</b>; esquecer que às vezes um item pequeno em valor é estratégico (um cliente-âncora); e "paralisar" analisando o rabo longo de itens irrelevantes.')}
   ${money('Se 3 contas respondem por 78% do custo do Astro Beer, atacar as outras 20 contas é gastar energia para mexer em 22%. O foco nas 3 é o que vira dinheiro no bolso do dono.')}
  </div>

  <!-- EX 1: Pareto interativo -->
  <div class="exercise" id="ex-pareto">
    <div class="ex-head"><div><div class="kicker">Exercício prático · 1 de 2</div><h3>Pareto de despesas — Astro Beer</h3></div><span class="badge">clique nos vitais</span></div>
    <div class="ex-body">
      <div class="scenario"><b>Cenário.</b> O Astro Beer (depósito de bebidas) gastou <b>R$ 250.000</b> no mês. Marque as contas que você atacaria primeiro — os "poucos vitais" que somam ~80% do gasto.</div>
      <table class="ptable" id="paretoTbl">
        <thead><tr><th style="width:34px"></th><th class="name">Conta</th><th>Gasto (R$)</th><th>% acum.</th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="btn-row">
        <button class="btn btn-primary" data-act="checkPareto">Verificar seleção</button>
        <button class="btn btn-ghost" data-act="revealPareto">Ver os vitais</button>
      </div>
      <div class="feedback" id="fbPareto"></div>
    </div>
  </div>

  <!-- EX 2: Meta 50% -->
  <div class="exercise" id="ex-meta">
    <div class="ex-head"><div><div class="kicker">Exercício prático · 2 de 2</div><h3>Definição de meta dentro da lacuna</h3></div><span class="badge">calcule</span></div>
    <div class="ex-body">
      <div class="scenario"><b>Cenário.</b> A maior conta do Astro Beer é <b>energia elétrica</b>: gasto atual de <b>R$ 8.000/mês</b>. O benchmark de um depósito bem gerido do mesmo porte (cluster) é <b>R$ 5.000/mês</b>.</div>
      <div class="row2">
        <div><label class="fld">Qual é a lacuna mensal? (R$)</label><input class="inp" id="mLacuna" inputmode="numeric" placeholder="ex: 3000"></div>
        <div><label class="fld">Meta anual pela regra Falconi — ~50% da lacuna (R$/mês)</label><input class="inp" id="mMeta" inputmode="numeric" placeholder="ex: 1500"></div>
      </div>
      <p class="hint">Regra Falconi: a meta do primeiro ano costuma ser cerca de metade da lacuna — ambiciosa, mas alcançável.</p>
      <div class="btn-row"><button class="btn btn-primary" data-act="checkMeta">Verificar</button></div>
      <div class="feedback" id="fbMeta"></div>
    </div>

 `,
 mount:()=>{
   const rows=[
     {n:'Aluguel do galpão',v:78000},{n:'Folha (equipe)',v:62000},{n:'Compra de estoque — extra',v:58000},
     {n:'Energia elétrica',v:8000},{n:'Frete/entregas',v:12000},{n:'Marketing',v:9000},
     {n:'Manutenção',v:6500},{n:'Telefonia/internet',v:4200},{n:'Material de escritório',v:2800},
     {n:'Taxas bancárias',v:6700},{n:'Diversos',v:2000}
   ].sort((a,b)=>b.v-a.v);
   const total=rows.reduce((s,r)=>s+r.v,0);
   let acc=0; rows.forEach(r=>{acc+=r.v; r.acc=acc/total*100;});
   const vital=new Set(); let a2=0; for(const r of rows){a2+=r.v; vital.add(r.n); if(a2/total>=0.8)break;}
   const tb=$('#paretoTbl tbody');
   tb.innerHTML=rows.map((r,i)=>`<tr data-name="${r.n}"><td><input type="checkbox" class="chk" data-i="${i}"></td>
     <td class="name">${r.n}</td><td>${brl(r.v)}</td><td>${r.acc.toFixed(0)}%</td></tr>`).join('');
   tb.addEventListener('change',e=>{const tr=e.target.closest('tr'); tr.classList.toggle('pick',e.target.checked);});
   $('[data-act="checkPareto"]').onclick=()=>{
     const sel=new Set($$('.chk',tb).filter(c=>c.checked).map(c=>rows[+c.dataset.i].n));
     const hit=[...vital].filter(v=>sel.has(v)).length; const extra=[...sel].filter(s=>!vital.has(s)).length;
     const fb=$('#fbPareto');
     if(hit===vital.size&&extra===0){fb.className='feedback show good';
       fb.innerHTML=`<b>É isso aí.</b> Você isolou os ${vital.size} vitais (${[...vital].join(', ')}) — eles somam ~80% do gasto. É neles que a Northel concentra o plano. O resto é ruído.`;}
     else{fb.className='feedback show info';
       fb.innerHTML=`Quase. Você marcou ${sel.size} conta(s); acertou ${hit} de ${vital.size} vitais${extra?` e incluiu ${extra} conta(s) do "rabo longo"`:''}. Dica: siga o <b>% acumulado</b> — pare de marcar quando ele passa de 80%.`;}
   };
   $('[data-act="revealPareto"]').onclick=()=>{
     $$('#paretoTbl tbody tr').forEach(tr=>{const isV=vital.has(tr.dataset.name); tr.classList.toggle('pick',isV);
       tr.querySelector('.chk').checked=isV; if(!isV)tr.querySelector('.name').style.color='var(--muted)';});
     const fb=$('#fbPareto'); fb.className='feedback show good';
     fb.innerHTML=`<b>Poucos vitais:</b> ${[...vital].join(', ')}. Juntas, ~80% do gasto. Regra prática Northel: <b>ataque de 2 a 4 contas</b>, nunca a lista inteira.`;
   };
   $('[data-act="checkMeta"]').onclick=()=>{
     const lac=+String($('#mLacuna').value).replace(/\D/g,''); const meta=+String($('#mMeta').value).replace(/\D/g,'');
     const fb=$('#fbMeta'); const okLac=Math.abs(lac-3000)<=50; const okMeta=Math.abs(meta-1500)<=100;
     if(okLac&&okMeta){fb.className='feedback show good';
       fb.innerHTML=`<b>Correto.</b> Lacuna = R$ 8.000 − R$ 5.000 = <b>R$ 3.000/mês</b>. Meta ano 1 ≈ 50% → <b>R$ 1.500/mês</b> de economia (energia sai de R$ 8.000 para R$ 6.500). Isso são <b>R$ 18.000/ano</b> no bolso do dono. Ano 2, ataca a metade restante.`;}
     else{fb.className='feedback show bad';
       fb.innerHTML=`Ainda não. A lacuna é a diferença atual − ideal (8.000 − 5.000 = 3.000). A meta é ~metade disso (1.500). ${okLac?'':'<br>↳ Revise a lacuna.'} ${okMeta?'':'<br>↳ A meta deve ser ~50% da lacuna.'}`;}
   };
 }
};

   'Ligo OKR e PDCA sem redundância (Objective=lacuna, KR=meta, iniciativa=medida).',
 ],
 body:()=>`
  <div class="prose">
   <p>OKR nasceu na Intel (Andy Grove) e virou febre no Google. Para a Northel, ele é a <strong>camada de alinhamento</strong>: quando o cliente tem equipe e precisa que todos puxem para o mesmo lado, OKR dá foco. É complementar ao PDCA — não concorre com ele.</p>

   <h2>OKR × KPI × meta tradicional</h2>
   <ul>
     <li><strong>KPI</strong> é um termômetro contínuo (mede a saúde da rotina).</li>
     <li><strong>Meta tradicional</strong> é um número a bater.</li>
     <li><strong>OKR</strong> junta ambição (Objective) com prova (Key Results) num ciclo curto, e alinha a empresa toda em torno de poucas prioridades.</li>
   </ul>

   <h2>Como escrever bem</h2>
   <p><strong>Objective</strong> — sem número, memorável, que dá vontade. Ex.: "Fazer o Astro Beer virar o depósito mais confiável da região."</p>
   <p><strong>Key Results</strong> — 2 a 5 por Objective, cada um com número e prazo. Ex.: "Reduzir ruptura de estoque de 12% para 4% no trimestre." Se dá para responder "feito/não feito" sem medir, é tarefa, não KR.</p>
   ${call('Regra de tamanho','Máximo 3–5 OKRs por nível e 2–5 KRs por OKR. Mais que isso não é foco, é lista de desejos.')}

   <h2>Cadência</h2>
   <ul>
     <li><strong>Trimestral:</strong> define os OKRs.</li>
     <li><strong>Semanal/quinzenal:</strong> check-in curto — o KR andou? o que trava?</li>
     <li><strong>Fim do ciclo:</strong> pontua (0 a 1.0) e faz retrospectiva.</li>
   </ul>
   <p>Comprometidos (must-hit) devem bater <strong>1.0</strong>. Aspiracionais (stretch) — <strong>0.7 já é vitória</strong>; se você bate 1.0 sempre, seus stretch eram fáceis demais.</p>

   <h2>Integração com PDCA — sem redundância</h2>
   ${quote('O Objective nasce da lacuna; os KRs são as metas; as medidas Falconi são as iniciativas que sustentam cada KR.','Integração Northel')}
   ${money('Traduzido para o dono: o OKR dá o "porquê que motiva"; o PDCA dá o "como que funciona". Um sem o outro é ou sonho sem método, ou método sem alma.')}
   ${call('Armadilhas','OKR virar checklist de tarefas; KR binário (feito/não feito) sem métrica; excesso de OKRs diluindo o foco; e copiar OKR de um trimestre para o outro sem revisar a lacuna.')}
  </div>

  <!-- EX: OKR builder com rubrica -->
  <div class="exercise" id="ex-okr">
    <div class="ex-head"><div><div class="kicker">Exercício prático · 1 de 1</div><h3>Escreva um OKR — Northel ou cliente</h3></div><span class="badge">rubrica automática</span></div>
    <div class="ex-body">
      <div class="scenario"><b>Cenário.</b> Escreva um OKR trimestral para o Studio Mattos (ou para a própria Northel). O app avalia contra a rubrica Falconi × OKR.</div>
      <label class="fld">Objective (qualitativo, sem número)</label>
      <input class="inp" id="oObj" placeholder="ex: Tornar o Studio Mattos referência em pontualidade e experiência">
      <label class="fld">Key Result 1 (com número e prazo)</label><input class="inp" id="oK1" placeholder="ex: Reduzir espera média de 30 para 10 min até 30/set">
      <label class="fld">Key Result 2</label><input class="inp" id="oK2" placeholder="ex: Elevar recompra mensal de 40% para 55%">
      <label class="fld">Key Result 3 (opcional)</label><input class="inp" id="oK3" placeholder="opcional">
      <div class="btn-row"><button class="btn btn-primary" data-act="checkOKR">Avaliar meu OKR</button></div>
      <div class="feedback" id="fbOKR"></div>
    </div>
  </div>
 `,
 mount:()=>{
   $('[data-act="checkOKR"]').onclick=()=>{
     const obj=$('#oObj').value.trim();
     const krs=[$('#oK1').value,$('#oK2').value,$('#oK3').value].map(x=>x.trim()).filter(Boolean);
     const fb=$('#fbOKR');
     if(!obj||krs.length<2){fb.className='feedback show info';fb.innerHTML='Precisa de um Objective e <b>ao menos 2 Key Results</b>.';return;}
     const objHasNum=/\d/.test(obj);
     const krNum=krs.filter(k=>/\d/.test(k)).length;
     const krTime=krs.filter(k=>/(at[ée]|\/|trimestre|m[êe]s|semana|dia|set|out|nov|dez|jan|fev|q\d)/i.test(k)).length;
     let pts=[]; let good=true;
     pts.push(objHasNum? ['⚠','O Objective tem número — ele deve ser <b>qualitativo</b>. Tire a métrica dele e leve para o KR.']:['✓','Objective qualitativo, sem número. Certo.']);
     if(objHasNum)good=false;
     pts.push(krNum===krs.length? ['✓','Todos os KRs têm número — dá para medir.']:[ '⚠',`${krs.length-krNum} KR sem número. KR precisa ser mensurável, senão é tarefa.`]);
     if(krNum!==krs.length)good=false;
     pts.push(krTime>=krs.length-0? ['✓','KRs com prazo. Bom.']:['⚠','Falta prazo em algum KR — todo KR fecha no fim do trimestre, deixe explícito.']);
     if(krTime<krs.length)good=false;
     pts.push(krs.length<=5? ['✓',`${krs.length} KRs — dentro do foco (2 a 5).`]:['⚠','KRs demais diluem foco.']);
     fb.className='feedback show '+(good?'good':'info');
     fb.innerHTML=(good?'<b>OKR sólido.</b> ':'<b>Quase lá — ajuste os pontos ⚠:</b> ')+
       '<ul style="margin:8px 0 0;padding-left:18px">'+pts.map(p=>`<li>${p[0]} ${p[1]}</li>`).join('')+'</ul>'+
       '<div style="margin-top:8px">Ligação PDCA: esse Objective deveria nascer de uma <b>lacuna</b> real, e cada KR ter <b>medidas (iniciativas)</b> que viram cards no Kanban.</div>';
   };
 }
};

M.m5={
 title:'Kanban — gestão visual da execução',
 sub:'O Plano de Ação vira quadro. Visualizar o trabalho, limitar o que está em curso e gerenciar o fluxo — a Gestão à Vista da execução.',
 concepts:[
   {t:'Visualizar',d:'Todo trabalho vira card num quadro. O invisível não se gerencia.'},
   {t:'Limitar WIP',d:'Work in Progress: teto de itens "em andamento" para não sobrecarregar.'},
   {t:'Gerenciar o fluxo',d:'O foco é o card atravessar o quadro rápido, não começar muita coisa.'},
   {t:'Lead time',d:'Tempo total do card, do pedido à entrega.'},
   {t:'Throughput',d:'Quantos cards são concluídos por período.'},
   {t:'Classes de serviço',d:'Urgente, padrão, data fixa — prioridade sinalizada no card.'},
 ],
 checklist:[
   'Monto um quadro Kanban (físico ou digital) para um plano de ação.',
   'Explico e aplico limite de WIP para conter sobrecarga.',
   'Sei o que são lead time e throughput e para que servem.',
   'Conduzo um stand-up curto adaptado para PME.',
   'Ligo cada ação do Plano 5W1H+S a um card, e o status do card ao R3G.',
 ],
 body:()=>`
  <div class="prose">
   <p>Kanban é a ferramenta que tira o Plano de Ação da gaveta. Cada linha do 5W1H+S vira um <strong>card</strong>; o quadro fica à vista; o dono e a equipe veem, num relance, o que está parado. É a Gestão à Vista aplicada à execução.</p>

   <h2>Os três princípios</h2>
   <ul>
     <li><strong>Visualizar o trabalho:</strong> Backlog → A Fazer → Em Andamento → Concluído.</li>
     <li><strong>Limitar o WIP:</strong> um teto de cards "em andamento". PME começa mil coisas e termina poucas — o WIP força terminar antes de começar.</li>
     <li><strong>Gerenciar o fluxo:</strong> a meta é o card <em>atravessar</em>, não acumular na coluna do meio.</li>
   </ul>
   ${call('Por que limitar o WIP muda o jogo','Sem limite, tudo fica "em andamento" e nada fica pronto. Com um teto (ex.: 3), a equipe precisa <b>concluir para poder puxar o próximo</b>. É o antídoto Falconi contra o "muito começado, pouco terminado".')}

   <h2>Métricas simples</h2>
   <p><strong>Lead time</strong>: quanto tempo um card leva do início ao fim. <strong>Throughput</strong>: quantos cards fecham por semana. Juntos dizem se a execução está fluindo ou emperrada — sem planilha complexa.</p>

   <h2>Stand-up para PME</h2>
   <p>Reunião curta (10–15 min), em pé, olhando o quadro. Três perguntas: o que fechou, o que está travado, o que puxo agora. Diária em operação intensa; semanal na maioria das PMEs.</p>

   ${quote('Cada ação do Plano de Ação vira um card no Kanban; o status do card alimenta o R3G.','Integração Falconi × Kanban')}
   ${money('Quando o quadro mostra 8 cards travados em "Em andamento", o dono vê que o gargalo não é falta de trabalho — é falta de conclusão. Isso é diagnóstico grátis, na parede.')}
  </div>

  <!-- EX: Kanban board interativo -->
  <div class="exercise" id="ex-kanban">
    <div class="ex-head"><div><div class="kicker">Exercício prático · 1 de 1</div><h3>Toque o plano de ação pelo quadro</h3></div><span class="badge">arraste os cards</span></div>
    <div class="ex-body">
      <div class="scenario"><b>Cenário.</b> Plano do Studio Mattos. Arraste os cards entre as colunas. A coluna <b>Em andamento</b> tem <b>limite WIP = 2</b> — tente estourar e veja o alerta.</div>
      <div class="kanban" id="kb">
        <div class="kcol" data-col="Backlog"><h4>Backlog <span class="wip">0</span></h4></div>
        <div class="kcol" data-col="A Fazer"><h4>A Fazer <span class="wip">0</span></h4></div>
        <div class="kcol" data-col="Em Andamento" data-wip="2"><h4>Em andamento <span class="wip">0/2</span></h4></div>
        <div class="kcol" data-col="Concluído"><h4>Concluído <span class="wip">0</span></h4></div>
      </div>
      <div class="feedback show info" id="fbKb">Dica: no celular, toque num card e depois na coluna de destino.</div>
    </div>
  </div>
 `,
 mount:()=>{
   const cards=[
     {t:'Criar agenda com horários por profissional',w:'Camila',col:'A Fazer'},
     {t:'Definir padrão de dosagem de tinta',w:'Ana',col:'A Fazer'},
     {t:'Instalar quadro de indicadores (GAV)',w:'Lucas',col:'Backlog'},
     {t:'Treinar equipe no novo padrão',w:'Ana',col:'Backlog'},
     {t:'Renegociar fornecedor de produtos',w:'Camila',col:'A Fazer'},
   ];
   const kb=$('#kb'); let selected=null;
   function render(){
     $$('.kcol',kb).forEach(c=>{ [...c.querySelectorAll('.kcard')].forEach(x=>x.remove()); });
     cards.forEach((c,i)=>{
       const col=$(`.kcol[data-col="${c.col}"]`,kb);
       const el=document.createElement('div'); el.className='kcard'; el.draggable=true; el.dataset.i=i;
       el.innerHTML=`${esc(c.t)}<span class="who">👤 ${esc(c.w)}</span>`;
       if(selected===i)el.style.outline='2px solid var(--cyan)';
       col.appendChild(el);
     });
     updateCounts();
   }
   function updateCounts(){
     $$('.kcol',kb).forEach(c=>{
       const n=c.querySelectorAll('.kcard').length; const wip=c.dataset.wip;
       c.querySelector('.wip').textContent=wip? `${n}/${wip}` : n;
       c.classList.toggle('wipwarn', wip && n>+wip);
     });
   }
   function move(i,col){
     const dest=$(`.kcol[data-col="${col}"]`,kb); const wip=dest.dataset.wip;
     if(wip){ const n=cards.filter(c=>c.col===col).length; if(cards[i].col!==col && n>=+wip){
       const fb=$('#fbKb'); fb.className='feedback show bad';
       fb.innerHTML=`<b>WIP estourado.</b> "Em andamento" só aceita ${wip} cards. Termine um antes de puxar outro — esse é o ponto do Kanban.`; return; } }
     cards[i].col=col; selected=null; render();
     if(col==='Concluído'){const fb=$('#fbKb'); fb.className='feedback show good';
       fb.innerHTML='Card concluído → no R3G, esse item vai para "presente/executado". É assim que o quadro alimenta o acompanhamento.';}
   }
   kb.addEventListener('dragstart',e=>{const c=e.target.closest('.kcard'); if(c){c.classList.add('dragging'); e.dataTransfer.setData('i',c.dataset.i);}});
   kb.addEventListener('dragend',e=>{const c=e.target.closest('.kcard'); if(c)c.classList.remove('dragging');});
   $$('.kcol',kb).forEach(col=>{
     col.addEventListener('dragover',e=>{e.preventDefault(); col.classList.add('over');});
     col.addEventListener('dragleave',()=>col.classList.remove('over'));
     col.addEventListener('drop',e=>{e.preventDefault(); col.classList.remove('over'); const i=+e.dataTransfer.getData('i'); move(i,col.dataset.col);});
   });
   kb.addEventListener('click',e=>{
     const card=e.target.closest('.kcard');
     if(card){ selected=+card.dataset.i; render(); return; }
     const col=e.target.closest('.kcol');
     if(col && selected!==null){ move(selected,col.dataset.col); }
   });
   render();
 }
};

   MOTOR — navegação, render, progresso, persistência
   ========================================================================== */
const ALL_MODULES=PHASES.flatMap(p=>p.modules);
function modLabel(id){const m=M[id]; return m?m.title:id;}
function phaseOfModule(id){return PHASES.findIndex(p=>p.modules.includes(id));}
function globalIndex(id){return ALL_MODULES.indexOf(id);}

/* ---- Welcome ---- */
function welcomeHTML(){
  const total=ALL_MODULES.length; const done=Object.keys(state.done).filter(k=>state.done[k]).length;
  const next = ALL_MODULES.find(id=>!state.done[id]) || 'm1';
  return `<div class="welcome">
    <div class="hero">
      <div class="eyebrow"><span class="bar"></span>Trilha de aprendizado · Northel</div>
      <h1>Gestão &amp; Governança, do zero ao nível de quem ensina.</h1>
      <p>Estude os frameworks — PDCA Falconi, OKRs, Kanban e negociação Chris Voss — e pratique em cada módulo com exercícios ancorados em R$ e nos clientes reais da Northel.</p>
    </div>
    <div class="wstats">
      <div class="wstat"><b>3</b><span>Fases</span></div>
      <div class="wstat"><b>${total}</b><span>Módulos</span></div>
      <div class="wstat"><b>${done}</b><span>Concluídos</span></div>
    </div>
    <div class="prose"><p style="font-size:16px">A trilha é sequencial: domine cada módulo (estude, pratique o exercício e marque o checklist) antes de avançar. Seu progresso fica salvo automaticamente.</p></div>
    <div class="phaselist">
      ${PHASES.map((p,i)=>`<div class="pcard"><span class="pk">${p.n}</span><h3>${p.label}</h3>
        <p>${p.modules.length} módulos · ${p.modules.map(m=>modLabel(m).split('—')[0].trim()).slice(0,3).join(' · ')}${p.modules.length>3?'…':''}</p></div>`).join('')}
    </div>
    <div class="btn-row"><button class="btn btn-primary" data-go="${next}">${done? 'Continuar de onde parei' : 'Começar pela Fase 1, Módulo 1'} ${ico('arrow')}</button></div>
  </div>`;
}

/* ---- Trail (rail) ---- */
function renderTrail(){
  const trail=$('#trail');
  trail.innerHTML=PHASES.map((p,pi)=>{
    const allDone=p.modules.every(m=>state.done[m]);
    const items=p.modules.map(id=>{
      const active=state.current===id?'active':''; const done=state.done[id]?'done':'';
      const gi=globalIndex(id);
      return `<li class="mod ${active} ${done}" data-go="${id}">
        <span class="dot">${state.done[id]?ico('check'):''}</span>
        <span class="mtitle"><span class="mnum">Módulo ${gi+1-PHASES.slice(0,pi).reduce((s,x)=>s+x.modules.length,0)}</span>${modLabel(id).split('—')[0].trim()}</span>
      </li>`;
    }).join('');
    return `<div class="phase ${allDone?'done':''}">
      <div class="phase-h"><span class="pn">${p.n}</span><span>${p.label}</span><span class="seal">◆ dominada</span></div>
      <ul class="mods">${items}</ul></div>`;
  }).join('');
  trail.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>go(el.dataset.go));
}

/* ---- progress ---- */
function updateProgress(){
  const total=ALL_MODULES.length; const done=ALL_MODULES.filter(id=>state.done[id]).length;
  const pct=Math.round(done/total*100);
  $('#progPct').textContent=pct+'%'; $('#progFill').style.width=pct+'%';
}

/* ---- render a module ---- */
function renderModule(id){
  const m=M[id]; const pi=phaseOfModule(id); const phase=PHASES[pi];
  const localIdx=phase.modules.indexOf(id); const gi=globalIndex(id);
  const prev=gi>0?ALL_MODULES[gi-1]:null; const next=gi<ALL_MODULES.length-1?ALL_MODULES[gi+1]:null;
  const c=$('#content');
  const checks=state.checks[id]||{};
  c.innerHTML=`
    <div class="eyebrow"><span class="bar"></span>${phase.n} · Módulo ${localIdx+1} de ${phase.modules.length}</div>
    <h1 class="mod-title">${modLabel(m.title)}</h1>
    <p class="lede">${m.sub}</p>
    ${m.body()}
    ${m.concepts?`<h2 style="font-family:var(--serif);font-weight:600;font-size:22px;margin:34px 0 6px;padding-top:20px;border-top:1px solid var(--line)">Quadro-resumo</h2>${conceptGrid(m.concepts)}`:''}
    <div class="checklist">
      <h3>Checklist de domínio</h3>
      <p class="sub">Marque cada item que você já domina de verdade. Complete todos para liberar o próximo módulo com consciência tranquila.</p>
      ${m.checklist.map((t,i)=>`<div class="ckitem ${checks[i]?'on':''}" data-ck="${i}">
        <span class="ckbox">${ico('check')}</span><span>${t}</span></div>`).join('')}
    </div>
    <div class="modnav">
      <div class="completebar">
        <div class="prog-mini" id="ckCount"></div>
        <button class="btn btn-primary" data-act="complete">${state.done[id]?'Módulo concluído ✓ — revisar':'Concluir módulo'} ${ico('check')}</button>
      </div>
      <div class="navbtns">
        ${prev?`<button class="btn btn-ghost" data-go="${prev}">← Anterior</button>`:''}
        ${next?`<button class="btn btn-ghost" data-go="${next}">Próximo →</button>`:`<span class="pill">Fim da trilha</span>`}
      </div>
    </div>`;
  // checklist behavior
  c.querySelectorAll('[data-ck]').forEach(el=>el.onclick=()=>{
    const i=+el.dataset.ck; state.checks[id]=state.checks[id]||{}; state.checks[id][i]=!state.checks[id][i];
    el.classList.toggle('on',state.checks[id][i]); updateCkCount(id); save();
  });
  c.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>go(el.dataset.go));
  c.querySelector('[data-act="complete"]').onclick=()=>completeModule(id);
  // mount interactive widgets
  if(m.mount)try{m.mount();}catch(e){console.warn('mount err',e);}
  updateCkCount(id);
  window.scrollTo({top:0,behavior:'instant'});
}
function updateCkCount(id){
  const m=M[id]; const checks=state.checks[id]||{}; const n=Object.values(checks).filter(Boolean).length;
  const el=$('#ckCount'); if(!el)return;
  el.innerHTML=`${n}/${m.checklist.length} itens de domínio marcados${n<m.checklist.length?' · faltam '+(m.checklist.length-n):' · pronto para avançar'}`;
}
function completeModule(id){
  const m=M[id]; const checks=state.checks[id]||{}; const n=Object.values(checks).filter(Boolean).length;
  if(n<m.checklist.length){
    // gentle nudge — mark all? no: prompt
    const el=$('#ckCount'); el.innerHTML=`<span style="color:var(--warn);font-weight:700">Marque os ${m.checklist.length-n} itens restantes do checklist antes de concluir — o método pede prática, não pressa.</span>`;
    const first=$('.ckitem:not(.on)'); if(first){first.style.transition='box-shadow .3s';first.style.boxShadow='0 0 0 3px rgba(201,138,31,.35)';setTimeout(()=>first.style.boxShadow='',900);}
    return;
  }
  state.done[id]=true; save(); renderTrail(); updateProgress();
  const next=ALL_MODULES[globalIndex(id)+1];
  const btn=$('[data-act="complete"]'); if(btn){btn.textContent='Concluído ✓'; btn.classList.add('btn-ghost'); btn.classList.remove('btn-primary');}
  if(next){setTimeout(()=>{if(confirm('Módulo concluído! Avançar para o próximo?'))go(next);},150);}
  else{alert('Trilha completa! Você dominou os três blocos: estudo, arquitetura do serviço e execução com cliente real.');}
}

/* ---- navigation ---- */
function go(id){
  state.current=id; save();
  closeDrawer();
  if(id==='welcome'){$('#content').innerHTML=welcomeHTML(); $('#content').querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>go(el.dataset.go)); $('#tbTitle').textContent='Trilha Northel'; renderTrail(); window.scrollTo({top:0}); return;}
  renderModule(id); renderTrail();
  $('#tbTitle').textContent=modLabel(M[id].title).split('—')[0].trim();
}

/* ---- persistence ---- */
let saveT; function save(){clearTimeout(saveT); saveT=setTimeout(()=>Store.set(KEY,state),200);}
async function load(){const s=await Store.get(KEY); if(s&&typeof s==='object'){state={...state,...s};}}

/* ---- mobile drawer ---- */
function openDrawer(){$('#rail').classList.add('open');$('#overlay').classList.add('show');}
function closeDrawer(){$('#rail').classList.remove('open');$('#overlay').classList.remove('show');}
$('#hamb').onclick=openDrawer; $('#overlay').onclick=closeDrawer;

/* ---- reset ---- */
$('#resetBtn').onclick=async()=>{
  if(confirm('Zerar todo o progresso, checklists e exercícios salvos?')){
    state={done:{},checks:{},notes:{},current:'welcome'}; await Store.del(KEY);
    renderTrail(); updateProgress(); go('welcome');
  }
};

/* ---- boot ---- */
(async function(){
  await load();
  renderTrail(); updateProgress();
  go(state.current||'welcome');
})();

</script>
</body>
</html>
